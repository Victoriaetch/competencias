<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Informes EDD</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
    --bg: #F0F4F8;
    --card: #FAFCFF;
    --text: #0F1A2A;
    --muted: #5A6B80;
    --accent: #1A4A8A;
    --border: rgba(15,26,42,0.12);
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
}

/* NAV */
nav{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(240,244,248,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:1rem 2rem;
}

.nav-title{
    font-family:var(--serif);
    font-size:1.1rem;
}

/* HERO */
.hero{
    max-width:1200px;
    margin:auto;
    padding:4rem 2rem 2rem;
}

.hero h1{
    font-family:var(--serif);
    font-size:clamp(2rem,4vw,3rem);
}

.hero p{
    color:var(--muted);
}

/* GRID */
.gallery{
    max-width:1200px;
    margin:auto;
    padding:2rem;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:1.5rem;
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:1.5rem;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    border-color:#b8cbe2;
}

.card-type{
    font-size:0.7rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
}

.card h3{
    font-family:var(--serif);
    margin:0.5rem 0;
}

.card a{
    color:var(--accent);
    text-decoration:none;
    font-weight:500;
}

.card a:hover{
    text-decoration:underline;
}

/* BACK BUTTON */
.back-wrap{
    text-align:center;
    padding:3rem;
}

.back-btn{
    background:var(--accent);
    color:white;
    padding:12px 22px;
    border-radius:8px;
    text-decoration:none;
}

.back-btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<nav>
    <div class="nav-title">Operación de Sistemas Mecatrónicos</div>
</nav>

<section class="hero">
    <h1>Informes ED</h1>
    <p>Electrónica Digital.</p>
</section>

<section class="gallery">

    <div class="card">
        <div class="card-type">Laboratorio</div>
        <h3>Laboratorio 1</h3>
        <a href="Operación%20de%20Sistemas%20Mecatrónicos/EDD/ED.pdf" target="_blank">Abrir PDF</a>
    </div>

    <div class="card">
        <div class="card-type">Laboratorio</div>
        <h3>Laboratorio 2</h3>
        <a href="Operación%20de%20Sistemas%20Mecatrónicos/EDD/ED%20Lab%202.docx.pdf" target="_blank">Abrir PDF</a>
    </div>

    <div class="card">
        <div class="card-type">Laboratorio</div>
        <h3>Laboratorio 3</h3>
        <a href="Operación%20de%20Sistemas%20Mecatrónicos/EDD/Laboratorio%203.pdf" target="_blank">Abrir PDF</a>
    </div>

    <div class="card">
        <div class="card-type">Laboratorio</div>
        <h3>Laboratorio 4</h3>
        <a href="Operación%20de%20Sistemas%20Mecatrónicos/EDD/Laboratorio%204.docx.pdf" target="_blank">Abrir PDF</a>
    </div>

</section>

<div class="back-wrap">
    <a class="back-btn" href="index.html">Volver al portafolio</a>
</div>

</body>
</html>
